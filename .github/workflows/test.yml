name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Bats
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update
            sudo apt-get install -y bats
          fi
      
      - name: Run unit tests
        run: make test-unit
      
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.os }}
          path: |
            tests/unit/*.tap
            tests/unit/*.log
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12', '3.14']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist

      - name: Install pyenv
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install pyenv
          else
            curl https://pyenv.run | bash
          fi

      - name: Setup pyenv with Python
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init -)"

          # Get the full Python version from actions/setup-python
          PYTHON_VERSION=$(python --version | cut -d' ' -f2)
          echo "Python version: $PYTHON_VERSION"

          # Reuse actions/setup-python's install directory as pyenv's version
          # dir via symlink — avoids pyenv's source build (~10–15 min for
          # 3.14 on Ubuntu). See Story H.b.i in docs/specs/stories.md.
          PY_INSTALL_DIR="$(dirname "$(dirname "$(python -c 'import sys; print(sys.executable)')")")"
          if [ -x "$PY_INSTALL_DIR/bin/python" ] || [ -x "$PY_INSTALL_DIR/bin/python3" ]; then
            mkdir -p "$PYENV_ROOT/versions"
            # Ensure bin/python exists (pyenv expects it); link to python3 if missing.
            if [ ! -e "$PY_INSTALL_DIR/bin/python" ] && [ -x "$PY_INSTALL_DIR/bin/python3" ]; then
              ln -s python3 "$PY_INSTALL_DIR/bin/python" || true
            fi
            ln -sfn "$PY_INSTALL_DIR" "$PYENV_ROOT/versions/$PYTHON_VERSION"
            echo "Symlinked $PY_INSTALL_DIR -> $PYENV_ROOT/versions/$PYTHON_VERSION"
          else
            echo "Fallback: source-building $PYTHON_VERSION via pyenv"
            pyenv install $PYTHON_VERSION || echo "Python $PYTHON_VERSION already available"
          fi

          pyenv global $PYTHON_VERSION

          # Verify pyenv setup
          pyenv version
          pyenv versions --bare
      
      - name: Run integration tests (venv only)
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"
          
          # Verify pyenv is working
          which pyenv
          pyenv version
          which python
          
          pytest tests/integration/ -v -m "venv and not requires_micromamba" --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: integration-${{ matrix.os }}-py${{ matrix.python-version }}
          name: integration-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}  # Optional for public repos, uses GitHub OIDC by default
      
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            .coverage
          if-no-files-found: ignore

  integration-tests-micromamba:
    name: Integration Tests with Micromamba (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12']  # Test micromamba with one Python version
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
      
      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: 'latest'
          environment-name: test-env
          create-args: >-
            python=${{ matrix.python-version }}
      
      - name: Run integration tests (micromamba)
        run: |
          pytest tests/integration/ -v -m "micromamba or requires_micromamba" --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: micromamba-${{ matrix.os }}-py${{ matrix.python-version }}
          name: micromamba-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}  # Optional for public repos, uses GitHub OIDC by default

  integration-tests-bootstrap:
    # Bootstrap-path coverage: unlike integration-tests-micromamba, this job
    # deliberately does NOT use mamba-org/setup-micromamba, so the runner
    # starts with no micromamba binary and pyve's auto-bootstrap code path
    # is exercised for real (downloads the tarball from micro.mamba.pm and
    # extracts it). Must run on both ubuntu-latest and macos-latest because
    # the tar-extraction bug in Story I.e only surfaces on GNU tar (Linux);
    # macOS BSD tar auto-detects. Requires outbound network to micro.mamba.pm.
    name: Integration Tests Bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist

      # Intentionally NO "Install micromamba" step. The bootstrap_isolation
      # fixture in tests/integration/test_bootstrap.py scrubs $PATH and
      # points $HOME at a fresh tmp dir, so pyve's get_micromamba_path
      # resolves to empty and --auto-bootstrap downloads a real tarball.

      - name: Run bootstrap integration tests
        run: |
          pytest tests/integration/test_bootstrap.py -v -m micromamba

      - name: Upload bootstrap test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-test-results-${{ matrix.os }}
          path: |
            .pytest_cache/
          if-no-files-found: ignore

  bash-coverage:
    name: Bash Coverage (kcov)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
      
      - name: Install Bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install kcov from source
        run: |
          sudo apt-get install -y cmake g++ pkg-config \
            libdw-dev libcurl4-openssl-dev libelf-dev
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          mkdir /tmp/kcov-src/build && cd /tmp/kcov-src/build
          cmake .. && make -j$(nproc)
          sudo make install
      
      - name: Install pyenv
        run: curl https://pyenv.run | bash
      
      - name: Setup pyenv with Python
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init -)"
          
          PYTHON_VERSION=$(python --version | cut -d' ' -f2)
          echo "Python version: $PYTHON_VERSION"
          pyenv install $PYTHON_VERSION || echo "Python $PYTHON_VERSION already available"
          pyenv global $PYTHON_VERSION
          pyenv version
      
      - name: Run Bats unit tests under kcov
        run: |
          kcov \
            --include-path="$(pwd)/lib/,$(pwd)/pyve.sh" \
            --bash-dont-parse-binary-dir \
            coverage-kcov \
            bats tests/unit/*.bats
      
      - name: Run integration tests under kcov
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"
          export PYVE_KCOV_OUTDIR="$(pwd)/coverage-kcov"
          
          pytest tests/integration/ -v -m "venv and not requires_micromamba"
      
      - name: Upload Bash coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-kcov/bats/cobertura.xml,./coverage-kcov/kcov-merged/cobertura.xml
          flags: bash
          name: bash-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload kcov HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bash-coverage-report
          path: coverage-kcov/
          if-no-files-found: ignore

  lint:
    name: Lint and Style Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Check shell scripts with shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -type f -exec shellcheck {} + || true
      
      - name: Check Python code style
        run: |
          python -m pip install --upgrade pip
          pip install black flake8
          black --check tests/ || true
          flake8 tests/ --max-line-length=120 || true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, integration-tests-micromamba, integration-tests-bootstrap, bash-coverage, lint]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Micromamba Tests: ${{ needs.integration-tests-micromamba.result }}"
          echo "Bootstrap Tests: ${{ needs.integration-tests-bootstrap.result }}"
          echo "Bash Coverage: ${{ needs.bash-coverage.result }}"
          echo "Lint: ${{ needs.lint.result }}"

          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests-bootstrap.result }}" != "success" ]; then
            echo "Tests failed!"
            exit 1
          fi

          echo "All required tests passed!"
