name: sentiment-poc
channels:
  - conda-forge
dependencies:
  - python=3.12.13

  # Packaging
  - setuptools
  - wheel

  # Core data
  - numpy
  - pandas>=2.2
  - pyarrow>=15.0
  - scikit-learn>=1.4
  - scipy

  # HuggingFace
  - datasets>=2.18
  - transformers>=4.40

  # Config & CLI
  - pyyaml>=6.0
  - click>=8.1
  - rich>=13.0
  - python-dotenv>=1.0

  # Notebooks & visualization
  - jupyterlab>=4.0
  - ipykernel
  - ipywidgets>=8.1
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.20

  # Testing & dev tooling
  - pytest
  - pytest-asyncio
  - pytest-cov
  - pytest-mock
  - ruff
  - mypy
  - conda-lock

  # Utilities
  - pillow
  - h5py

  # pip-only packages (Apple Silicon optimized or not on conda-forge)
  - pip
  - pip:
    - torch>=2.2          # MPS (Metal) support for Apple Silicon
    - gentlify>=0.1       # Async concurrency, throttling, progress
